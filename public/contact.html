<!DOCTYPE html>

<head>

</head>
<body>
    <nav>
        <a href="/" class="logo">
            <img src="/images/logo.png" alt="SOS Segurança">
        </a>
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/quem-somos">Quem Somos</a></li>
            <li><a href="/fale-conosco" class="active">Fale Conosco</a></li>
        </ul>
    </nav>

    <header class="section" style="padding-top: 150px;">
        <h1 class="section-title animate-fade-up">Solicite um Orçamento</h1>
        <div class="contact-container animate-fade-up">
            <div style="text-align: center; margin-bottom: 2rem;">
                <p>Prefere falar agora? <a href="https://wa.me/5584999212114" style="color: var(--accent); text-decoration: none; font-weight: 600;">Chame no WhatsApp: (84) 9 9921 2114</a></p>
            </div>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ex: João Silva" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Ex: joao@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Equipamento de Interesse</label>
                    <textarea id="message" name="message" rows="5" placeholder="Descreva sua necessidade (Câmeras, Cerca, Alarme, etc.)" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar Solicitação</button>
            </form>
            <div id="formFeedback" style="margin-top: 1.5rem; text-align: center; display: none; color: var(--accent);">
                Solicitação enviada com sucesso! Nossa equipe técnica retornará em breve.
            </div>
        </div>
